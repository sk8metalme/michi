name: Multi-Repo CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'scripts/commands/multi-repo/**'
      - 'scripts/config/**'
      - 'scripts/github-actions-client.ts'
      - 'scripts/confluence-sync.ts'
      - 'scripts/mermaid-converter.ts'
      - 'scripts/utils/multi-repo-validator.ts'
      - 'src/__tests__/multi-repo/**'
      - 'docs/user-guide/guides/multi-repo-*.md'
      - 'docs/user-guide/reference/multi-repo-*.md'
      - '.github/workflows/multi-repo-ci.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'scripts/commands/multi-repo/**'
      - 'scripts/config/**'
      - 'scripts/github-actions-client.ts'
      - 'scripts/confluence-sync.ts'
      - 'scripts/mermaid-converter.ts'
      - 'scripts/utils/multi-repo-validator.ts'
      - 'src/__tests__/multi-repo/**'
      - 'docs/user-guide/guides/multi-repo-*.md'
      - 'docs/user-guide/reference/multi-repo-*.md'
      - '.github/workflows/multi-repo-ci.yml'

jobs:
  test:
    name: Multi-Repo Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run multi-repo tests with coverage
        run: npm run test:coverage -- src/__tests__/multi-repo
        env:
          # Environment variables for tests
          CI: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: multi-repo
          name: multi-repo-coverage-${{ matrix.node-version }}
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/
          retention-days: 7

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'push'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Multi-Repo CI Tests Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Multi-Repo CI Tests Failed*\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.event.head_commit.url }}|${{ github.event.head_commit.message }}>\n*Node:* ${{ matrix.node-version }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify multi-repo commands exist
        run: |
          test -f dist/scripts/commands/multi-repo/init.js || exit 1
          test -f dist/scripts/commands/multi-repo/add-repo.js || exit 1
          test -f dist/scripts/commands/multi-repo/list.js || exit 1
          test -f dist/scripts/commands/multi-repo/ci-status.js || exit 1
          test -f dist/scripts/commands/multi-repo/test.js || exit 1
          test -f dist/scripts/commands/multi-repo/confluence-sync.js || exit 1
          echo "✅ All multi-repo commands built successfully"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'push'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Multi-Repo Build Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Multi-Repo Build Failed*\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.event.head_commit.url }}|${{ github.event.head_commit.message }}>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint on multi-repo files
        run: |
          npm run lint -- \
            scripts/commands/multi-repo/**/*.ts \
            scripts/github-actions-client.ts \
            scripts/confluence-sync.ts \
            scripts/mermaid-converter.ts \
            scripts/utils/multi-repo-validator.ts \
            src/__tests__/multi-repo/**/*.ts

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'push'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Multi-Repo Lint Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Multi-Repo Lint Failed*\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.event.head_commit.url }}|${{ github.event.head_commit.message }}>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'push'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Multi-Repo Type Check Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Multi-Repo Type Check Failed*\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.event.head_commit.url }}|${{ github.event.head_commit.message }}>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, build, lint, type-check]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"

          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ]; then
            echo "❌ Multi-Repo CI Failed"
            exit 1
          else
            echo "✅ Multi-Repo CI Passed"
          fi

      - name: Notify Slack on success
        if: success() && github.event_name == 'push'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Multi-Repo CI Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Multi-Repo CI Passed*\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.event.head_commit.url }}|${{ github.event.head_commit.message }}>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
